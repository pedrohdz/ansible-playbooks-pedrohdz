---
- name: Ensure homeshick repos directory exists
  ansible.builtin.file:
    mode: '0700'
    path: '{{ phdz_homeshick_repo_dir }}'
    state: directory

# This directory will likely be created elsewhere as well, but I think this
# should be harmless.
- name: Ensure secure directory for SSH ControlPath
  ansible.builtin.file:
    mode: '0700'
    path: '{{ phdz_homeshick_ssh_sockets_dir }}'
    state: directory

- name: Ensure homeshick is cloned
  ansible.builtin.git:
    repo: '{{ phdz_homeshick_repo_url }}'
    dest: '{{ phdz_homeshick_repo_dir }}/homeshick'
    version: '{{ phdz_homeshick_version }}'
    update: false
  notify: phdz_homeshick | on-clone-updated

- name: Wait for operator confirmation (SSH key auth may be required)
  ansible.builtin.pause:
    prompt: 'Press Enter once ready (SSH key authorization may be needed)...'
  when: phdz_homeshick_wait_for_ssh_key_auth | bool

- name: Ensure homeshick castles are cloned
  ansible.builtin.git: # noqa: latest[git]
    repo: '{{ item }}'
    dest: '{{ phdz_homeshick_repo_dir }}/{{ _target_dir }}'
    update: false
    ssh_opts: >-
      {{ phdz_homeshick_ssh_opts }}
      {{ phdz_homeshick_castle_ssh_opts[_castle_namespace] | default('') }}
  loop: '{{ phdz_homeshick_castles }}'
  when: phdz_homeshick_castles | length > 0
  notify: phdz_homeshick | on-clone-updated
  vars:
    _target_dir: >-
      {{ (item | regex_replace('.*/', '')) | regex_replace('\.git$', '') }}
    # Group the ControlMaster socket -- and pick the right account identity --
    # by the repo's owner/namespace rather than by SSH connection tokens
    # (%r@%h:%p). Git hosts like GitHub always use "git" as the SSH user, so
    # two castles owned by different accounts on the same host would otherwise
    # collapse onto a single socket and reuse whichever account authenticated
    # first -- the exact problem this avoids. Castles sharing a namespace (and
    # therefore the same key) still share one socket, so multiplexing
    # continues to minimize hardware-key prompts.
    _castle_namespace: >-
      {{ item | regex_replace('^.*[:/]([^/:]+)/[^/]+?(?:\.git)?$', '\1') }}
    phdz_homeshick_ssh_socket_key: '{{ _castle_namespace }}'

- name: Flush pending handlers
  ansible.builtin.meta: flush_handlers
